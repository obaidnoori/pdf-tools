<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free PDF Tools | 76 Supplier Company</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

    <header class="sticky-header">
        <div class="logo">76 PDF Tools</div>
        <div class="nav-links">
            <a href="https://www.buymeacoffee.com/YOUR_USERNAME" target="_blank" class="bmac-btn">☕ Buy Me a Coffee</a>
        </div>
    </header>

    <main>
        <section id="hero">
            <h1>Privacy-First PDF Tools</h1>
            <p>Processing happens in your browser. Files never leave your computer.</p>
        </section>

        <section id="merger" class="tool-box">
            <h2>Merge PDFs</h2>
            <input type="file" id="pdf-input" multiple accept=".pdf">
            <button onclick="mergePdfs()">Merge & Download</button>
            <p id="status"></p>
        </section>

        </main>

    <footer>
        <p>&copy; 2026 76 Supplier Company | Built for Speed & Privacy</p>
    </footer>

    <script src="script.js"></script>

<section id="splitter" class="tool-box">
    <h2>Split PDF</h2>
    <input type="file" id="split-input" accept=".pdf">
    <input type="text" id="page-range" placeholder="e.g., 1-2 (Leave blank for all pages)">
    <button onclick="splitPdf()">Split & Download</button>
    <p id="split-status"></p>
</section>

    <section id="merger" class="tool-box">
    <h2>Advanced PDF Merger</h2>
    <input type="file" id="pdf-input" multiple accept=".pdf" onchange="handleFileSelect(event)">
    <ul id="file-list" style="list-style: none; padding: 0; max-width: 400px; margin: 20px auto;"></ul>
    <button onclick="mergePdfs()">Merge in This Order</button>
    <p id="status"></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<section id="splitter" class="tool-box">
    <h2>Batch PDF Splitter (76 Supplier)</h2>
    <input type="file" id="split-input" accept=".pdf">
    <div style="margin: 15px 0;">
        <label>Split every </label>
        <input type="number" id="split-interval" value="10" min="1" style="width: 50px;">
        <label> pages</label>
    </div>
    <button onclick="batchSplitPdf()">Split & Download ZIP</button>
    <p id="split-status"></p>
</section>
<section id="splitter" class="tool-box">
    <h2>Split PDF into Separate Files</h2>
    <input type="file" id="split-input" accept=".pdf">
    <button onclick="splitAllPages()">Split into Single Pages</button>
    <p id="split-status"></p>
</section>
    
</body>
</html>
