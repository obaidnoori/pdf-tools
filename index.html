<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free PDF Tools | 76 Supplier Company</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>

    <header class="sticky-header">
        <div class="logo">76 PDF Tools</div>
        <div class="nav-links">
            <a href="https://www.buymeacoffee.com/YOUR_USERNAME" target="_blank" class="bmac-btn">☕ Buy Me a Coffee</a>
        </div>
    </header>

    <main>
        <section id="hero">
            <h1>Privacy-First PDF Tools</h1>
            <p>Processing happens in your browser. Files never leave your computer.</p>
        </section>

        <section id="merger" class="tool-box">
            <h2>Merge PDFs</h2>
            <input type="file" id="pdf-input" multiple accept=".pdf">
            <button onclick="mergePdfs()">Merge & Download</button>
            <p id="status"></p>
        </section>

        </main>

    <footer>
        <p>&copy; 2026 76 Supplier Company | Built for Speed & Privacy</p>
    </footer>

    <script src="script.js"></script>

<section id="splitter" class="tool-box">
    <h2>Split PDF</h2>
    <input type="file" id="split-input" accept=".pdf">
    <input type="text" id="page-range" placeholder="e.g., 1-2 (Leave blank for all pages)">
    <button onclick="splitPdf()">Split & Download</button>
    <p id="split-status"></p>
</section>
    
</body>
</html>
